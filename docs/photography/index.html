<script>
    function openGal(n){
        document.querySelectorAll('[id^="grid-"]').forEach(e=>e.style.display='none');
        document.getElementById('grid-'+n).style.display='block';
        document.getElementById('jerry-title').innerText=n.replace(/_/g," ");
        document.getElementById('jerry-idx').style.display='none';
        const d=document.getElementById('jerry-det');
        d.style.display='block'; setTimeout(()=>d.style.opacity='1',10);
    }
    function closeGal(){
        const d=document.getElementById('jerry-det');
        d.style.opacity='0';
        setTimeout(()=>{ d.style.display='none'; document.getElementById('jerry-idx').style.display='grid'; window.scrollTo(0,0); },400);
    }
    document.addEventListener("DOMContentLoaded",()=> { if(typeof Fancybox!=="undefined") Fancybox.bind("[data-fancybox]",{Toolbar:{display:{right:["close"]}}}); });
</script>

<script>
    let menu = document.getElementById('menu');
    if (menu) {
        
        const scrollPosition = localStorage.getItem("menu-scroll-position");
        if (scrollPosition) {
            menu.scrollLeft = parseInt(scrollPosition, 10);
        }
        
        menu.onscroll = function () {
            localStorage.setItem("menu-scroll-position", menu.scrollLeft);
        }
    }

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener("click", function (e) {
            e.preventDefault();
            var id = this.getAttribute("href").substr(1);
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView({
                    behavior: "smooth"
                });
            } else {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView();
            }
            if (id === "top") {
                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });

</script>
<script>
    var mybutton = document.getElementById("top-link");
    window.onscroll = function () {
        if (document.body.scrollTop > 800 || document.documentElement.scrollTop > 800) {
            mybutton.style.visibility = "visible";
            mybutton.style.opacity = "1";
        } else {
            mybutton.style.visibility = "hidden";
            mybutton.style.opacity = "0";
        }
    };

</script>
<script>
    document.getElementById("theme-toggle").addEventListener("click", () => {
        const html = document.querySelector("html");
        if (html.dataset.theme === "dark") {
            html.dataset.theme = 'light';
            localStorage.setItem("pref-theme", 'light');
        } else {
            html.dataset.theme = 'dark';
            localStorage.setItem("pref-theme", 'dark');
        }
    })
